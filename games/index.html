<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Zona Bermain — SD Industri</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#2E7D32;--green-l:#4CAF50;--green-pale:#E8F5E9;
  --blue:#1565C0;--blue-l:#1E88E5;--blue-pale:#E3F2FD;
  --amber:#E65100;--amber-l:#FB8C00;--amber-pale:#FFF3E0;
  --red:#C62828;--purple:#6A1B9A;
  --bg:#F0F4F0;--white:#fff;--text:#1a1a1a;--muted:#666;
  --radius:16px;--shadow:0 4px 20px rgba(0,0,0,0.12);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
h1{font-size:clamp(24px,4vw,40px);font-weight:900;color:var(--green);text-align:center;margin-bottom:8px;}
.subtitle{font-size:clamp(14px,2vw,18px);color:var(--muted);text-align:center;margin-bottom:48px;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;width:100%;max-width:900px;}
.card{background:var(--white);border-radius:var(--radius);padding:32px 24px;text-align:center;cursor:pointer;border:3px solid transparent;transition:all .2s;box-shadow:var(--shadow);user-select:none;-webkit-user-select:none;}
.card:hover,.card:active{transform:translateY(-4px);box-shadow:0 8px 32px rgba(0,0,0,0.18);}
.card.green{border-color:var(--green-l);}
.card.green:hover{background:var(--green-pale);}
.card.blue{border-color:var(--blue-l);}
.card.blue:hover{background:var(--blue-pale);}
.card.amber{border-color:var(--amber-l);}
.card.amber:hover{background:var(--amber-pale);}
.card-icon{font-size:clamp(40px,6vw,72px);margin-bottom:16px;display:block;}
.card-title{font-size:clamp(18px,2.5vw,26px);font-weight:800;margin-bottom:8px;color:var(--text);}
.card-desc{font-size:clamp(13px,1.5vw,16px);color:var(--muted);line-height:1.5;}
.badge{display:inline-block;margin-top:12px;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.badge-green{background:var(--green-pale);color:var(--green);}
.badge-blue{background:var(--blue-pale);color:var(--blue);}
.badge-amber{background:var(--amber-pale);color:var(--amber);}
.api-note{margin-top:40px;background:var(--white);border-radius:12px;padding:16px 24px;font-size:13px;color:var(--muted);text-align:center;max-width:600px;border:1px solid #e0e0e0;}
.api-note code{background:#f5f5f5;padding:2px 6px;border-radius:4px;font-family:monospace;color:var(--text);}
@media(max-width:640px){.grid{grid-template-columns:1fr;max-width:360px;}}
</style>
</head>
<body>
<h1>🎮 Zona Bermain SD Industri</h1>
<p class="subtitle">Pilih game untuk mulai belajar sambil bermain!</p>
<div class="grid">
  <div class="card green" onclick="openGame('tug')">
    <span class="card-icon">🪢</span>
    <div class="card-title">Tarik Tambang</div>
    <div class="card-desc">Tim Merah vs Tim Biru — jawab soal untuk menarik tali!</div>
    <span class="badge badge-green">2 Tim</span>
  </div>
  <div class="card blue" onclick="openGame('race')">
    <span class="card-icon">🏎️</span>
    <div class="card-title">Balapan Pintar</div>
    <div class="card-desc">Jawab soal dengan benar, mobilmu melaju ke garis finish!</div>
    <span class="badge badge-blue">2 Tim</span>
  </div>
  <div class="card amber" onclick="openGame('mole')">
    <span class="card-icon">🎯</span>
    <div class="card-title">Tepuk Jawaban</div>
    <div class="card-desc">Tepuk jawaban yang benar sebelum tim lawan!</div>
    <span class="badge badge-amber">2 Tim</span>
  </div>
</div>
<script>
function openGame(g){
  const map={tug:'tug-of-war.html',race:'race.html',mole:'whack-mole.html'};
  window.location.href=map[g];
}
</script>
</body>
</html>

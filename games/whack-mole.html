<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>Tepuk Jawaban — SD Industri</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
body{background:#0a0e1a;display:flex;flex-direction:column;align-items:center;}

.hdr{width:100%;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:rgba(255,255,255,.05);flex-shrink:0;}
.hdr-title{color:#fff;font-size:18px;font-weight:800;}
.hdr-btn{background:rgba(255,255,255,.12);color:#fff;border:none;padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;}

.scores-bar{display:flex;width:100%;align-items:center;justify-content:space-between;padding:6px 20px;flex-shrink:0;}
.sb{display:flex;flex-direction:column;align-items:center;gap:2px;}
.sb-label{font-size:clamp(11px,1.5vw,14px);color:rgba(255,255,255,.6);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.sb-val{font-size:clamp(24px,4vw,42px);font-weight:900;}
.sb.red .sb-val{color:#EF5350;}
.sb.blue .sb-val{color:#42A5F5;}
.sb-streak{font-size:11px;font-weight:700;min-height:14px;}
.sb.red .sb-streak{color:#FFAB91;}
.sb.blue .sb-streak{color:#81D4FA;}
.timer-center{display:flex;flex-direction:column;align-items:center;gap:4px;}
.timer-num{font-size:clamp(28px,5vw,48px);font-weight:900;color:#F9A825;font-variant-numeric:tabular-nums;min-width:50px;text-align:center;}
.timer-ring{width:60px;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
.timer-ring-fill{height:100%;background:#F9A825;border-radius:3px;transition:width .1s linear,background .1s;}

/* QUESTION */
.q-section{width:100%;max-width:900px;padding:4px 16px;flex-shrink:0;}
.q-box{background:rgba(255,255,255,.07);border-radius:12px;padding:12px 18px;text-align:center;}
.q-meta{display:flex;gap:8px;justify-content:center;align-items:center;margin-bottom:6px;}
.q-tag{background:#F9A825;color:#4a2c00;padding:2px 10px;border-radius:14px;font-size:11px;font-weight:700;}
.q-cnt{color:rgba(255,255,255,.4);font-size:12px;}
.q-text{color:#fff;font-size:clamp(16px,2.5vw,24px);font-weight:700;line-height:1.35;}

/* ARENA */
.arena{flex:1;width:100%;max-width:900px;padding:0 16px;position:relative;overflow:hidden;}
.divider{position:absolute;left:50%;top:0;bottom:0;width:3px;background:rgba(255,255,255,.08);transform:translateX(-50%);}
.zone-label{position:absolute;top:8px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;padding:3px 10px;border-radius:10px;}
.zone-label.red{left:16px;color:#EF5350;background:rgba(239,83,80,.12);}
.zone-label.blue{right:16px;color:#42A5F5;background:rgba(66,165,245,.12);}
.bubble{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:800;text-align:center;padding:8px;line-height:1.2;transition:transform .08s;border:3px solid;animation:float linear infinite;}
.bubble:active{transform:scale(.88)!important;}
.bubble.correct-anim{animation:pop .3s forwards!important;}
.bubble.wrong-anim{animation:shake .3s forwards!important;}
@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-12px)}100%{transform:translateY(0)}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(0);opacity:0}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* SCREENS */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:100;padding:24px;background:linear-gradient(135deg,#0a0e1a,#131b2e);}
.screen.hidden{display:none;}
.screen h2{font-size:clamp(24px,5vw,48px);font-weight:900;color:#fff;text-align:center;}
.screen p{font-size:clamp(13px,2vw,17px);color:rgba(255,255,255,.7);text-align:center;max-width:460px;}
.big-btn{padding:14px 40px;border-radius:14px;font-size:clamp(15px,2.2vw,20px);font-weight:800;border:none;cursor:pointer;}
.big-btn.green{background:#4CAF50;color:#fff;}
.big-btn.yellow{background:#F9A825;color:#4a2c00;}
.sel-wrap{display:flex;flex-direction:column;gap:8px;width:100%;max-width:360px;}
.sel-wrap label{color:rgba(255,255,255,.7);font-size:13px;}
.sel-wrap select{padding:9px 12px;border-radius:10px;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-size:15px;outline:none;}
.result-row{display:flex;gap:24px;align-items:center;}
.rr{text-align:center;}
.rr-v{font-size:clamp(28px,5vw,52px);font-weight:900;}
.rr-l{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:3px;}
.rr.red .rr-v{color:#EF5350;} .rr.red .rr-l{color:#EF9A9A;}
.rr.blue .rr-v{color:#42A5F5;} .rr.blue .rr-l{color:#90CAF9;}
.vs-sep{color:rgba(255,255,255,.3);font-size:20px;font-weight:900;}
.feedback{position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);font-size:clamp(24px,5vw,56px);font-weight:900;pointer-events:none;z-index:300;opacity:0;transition:opacity .15s;text-align:center;}
</style>
</head>
<body>

<!-- START -->
<div class="screen" id="start-screen">
  <div style="font-size:60px">🎯</div>
  <h2>Tepuk Jawaban!</h2>
  <p>Gelembung jawaban akan melayang. Tim Merah (sisi kiri) dan Tim Biru (sisi kanan) — tepuk gelembung dengan jawaban yang BENAR!</p>
  <div class="sel-wrap">
    <label>Mata Pelajaran</label>
    <select id="subject-select"><option value="all">Semua</option></select>
    <label style="margin-top:6px">Jumlah Soal</label>
    <select id="count-select">
      <option value="5">5 soal</option>
      <option value="10" selected>10 soal</option>
      <option value="15">15 soal</option>
    </select>
    <label style="margin-top:6px">Waktu per Soal</label>
    <select id="time-select">
      <option value="10">10 detik (cepat)</option>
      <option value="15" selected>15 detik (normal)</option>
      <option value="20">20 detik (santai)</option>
    </select>
  </div>
  <div id="load-status" style="color:rgba(255,255,255,.5);font-size:14px">Memuat soal...</div>
  <button class="big-btn green" id="start-btn" onclick="startGame()" style="display:none">▶ Mulai!</button>
  <button class="hdr-btn" onclick="location.href='index.html'" style="background:rgba(255,255,255,.1);margin-top:4px">← Kembali</button>
</div>

<!-- GAME -->
<div class="hdr">
  <div class="hdr-title">🎯 Tepuk Jawaban</div>
  <button class="hdr-btn" onclick="if(confirm('Keluar?'))location.href='index.html'">✕ Keluar</button>
</div>

<div class="scores-bar">
  <div class="sb red">
    <div class="sb-label">🔴 Merah</div>
    <div class="sb-val" id="score-red">0</div>
    <div class="sb-streak" id="streak-red"></div>
  </div>
  <div class="timer-center">
    <div class="timer-num" id="timer-num">15</div>
    <div class="timer-ring"><div class="timer-ring-fill" id="timer-ring-fill"></div></div>
    <div style="color:rgba(255,255,255,.4);font-size:10px;margin-top:2px" id="q-counter">1/10</div>
  </div>
  <div class="sb blue">
    <div class="sb-label">🔵 Biru</div>
    <div class="sb-val" id="score-blue">0</div>
    <div class="sb-streak" id="streak-blue"></div>
  </div>
</div>

<div class="q-section">
  <div class="q-box">
    <div class="q-meta">
      <span class="q-tag" id="q-tag">IPA</span>
      <span class="q-cnt" id="q-cnt">Soal 1</span>
    </div>
    <div class="q-text" id="q-text">Memuat soal...</div>
  </div>
</div>

<div class="arena" id="arena">
  <div class="divider"></div>
  <div class="zone-label red">Tim Merah</div>
  <div class="zone-label blue">Tim Biru</div>
</div>

<!-- END -->
<div class="screen hidden" id="end-screen">
  <div id="win-emoji" style="font-size:64px"></div>
  <h2 id="win-text"></h2>
  <p id="win-sub"></p>
  <div class="result-row">
    <div class="rr red"><div class="rr-v" id="final-red">0</div><div class="rr-l">Tim Merah</div></div>
    <div class="vs-sep">VS</div>
    <div class="rr blue"><div class="rr-v" id="final-blue">0</div><div class="rr-l">Tim Biru</div></div>
  </div>
  <div style="display:flex;gap:12px;margin-top:8px">
    <button class="big-btn green" onclick="restartGame()">🔄 Main Lagi</button>
    <button class="big-btn yellow" onclick="location.href='index.html'">🏠 Menu</button>
  </div>
</div>

<div class="feedback" id="feedback"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbw62t9g-ZgCt-yT26lUsXId_jFwwvunxr8vHlYzSmzCj9mkdEl0puOWfsZpcYtG1Mjx/exec';

let allQ=[], filtered=[], currentQ=0, totalQ=10, TIMER_SEC=15;
let scoreRed=0, scoreBlue=0, streakRed=0, streakBlue=0;
let timer, timerLeft, answered=false;
let bubbles=[];

const COLORS_RED  = [{bg:'rgba(239,83,80,.25)',border:'#EF5350',text:'#FFCDD2'},{bg:'rgba(183,28,28,.3)',border:'#C62828',text:'#FFCDD2'},{bg:'rgba(255,138,101,.2)',border:'#FF8A65',text:'#FFCCBC'}];
const COLORS_BLUE = [{bg:'rgba(66,165,245,.25)',border:'#42A5F5',text:'#BBDEFB'},{bg:'rgba(21,101,192,.3)',border:'#1565C0',text:'#BBDEFB'},{bg:'rgba(100,181,246,.2)',border:'#64B5F6',text:'#E3F2FD'}];

async function loadQuestions() {
  try {
    const params=new URLSearchParams({action:'get',sheet:'soal_game',public:'true'});
    const res=await fetch(`${API_URL}?${params}`);
    const json=JSON.parse(await res.text());
    if(json.success&&json.data.length){allQ=json.data.filter(q=>q.pertanyaan&&q.jawaban_benar);populateSubjects();showStart();}
    else useFallback();
  } catch{useFallback();}
}

function useFallback(){
  allQ=[
    {pertanyaan:'Berapa hasil 6 × 8?',pilihan_a:'42',pilihan_b:'48',pilihan_c:'54',pilihan_d:'36',jawaban_benar:'B',mata_pelajaran:'Matematika'},
    {pertanyaan:'Apa nama proses daun hijau membuat makanan?',pilihan_a:'Respirasi',pilihan_b:'Transpirasi',pilihan_c:'Fotosintesis',pilihan_d:'Fermentasi',jawaban_benar:'C',mata_pelajaran:'IPA'},
    {pertanyaan:'Sungai terpanjang di Indonesia?',pilihan_a:'Citarum',pilihan_b:'Bengawan Solo',pilihan_c:'Kapuas',pilihan_d:'Musi',jawaban_benar:'C',mata_pelajaran:'IPS'},
    {pertanyaan:'15² = ?',pilihan_a:'225',pilihan_b:'180',pilihan_c:'200',pilihan_d:'256',jawaban_benar:'A',mata_pelajaran:'Matematika'},
    {pertanyaan:'Antonim dari kata "rajin"?',pilihan_a:'Cerdas',pilihan_b:'Malas',pilihan_c:'Pintar',pilihan_d:'Jujur',jawaban_benar:'B',mata_pelajaran:'B.Indonesia'},
    {pertanyaan:'Planet yang paling dekat dengan matahari?',pilihan_a:'Venus',pilihan_b:'Bumi',pilihan_c:'Merkurius',pilihan_d:'Mars',jawaban_benar:'C',mata_pelajaran:'IPA'},
    {pertanyaan:'1000 − 375 = ?',pilihan_a:'635',pilihan_b:'615',pilihan_c:'625',pilihan_d:'645',jawaban_benar:'C',mata_pelajaran:'Matematika'},
    {pertanyaan:'Benua terluas di dunia?',pilihan_a:'Afrika',pilihan_b:'Amerika',pilihan_c:'Eropa',pilihan_d:'Asia',jawaban_benar:'D',mata_pelajaran:'IPS'},
    {pertanyaan:'Hewan yang mengalami metamorfosis sempurna?',pilihan_a:'Belalang',pilihan_b:'Kecoa',pilihan_c:'Kupu-kupu',pilihan_d:'Jangkrik',jawaban_benar:'C',mata_pelajaran:'IPA'},
    {pertanyaan:'√81 = ?',pilihan_a:'7',pilihan_b:'8',pilihan_c:'9',pilihan_d:'10',jawaban_benar:'C',mata_pelajaran:'Matematika'},
  ];
  populateSubjects();showStart();
}

function populateSubjects(){
  const subj=[...new Set(allQ.map(q=>q.mata_pelajaran).filter(Boolean))];
  const sel=document.getElementById('subject-select');
  subj.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o);});
}

function showStart(){
  document.getElementById('load-status').style.display='none';
  document.getElementById('start-btn').style.display='block';
}

function startGame(){
  const subj=document.getElementById('subject-select').value;
  totalQ=parseInt(document.getElementById('count-select').value);
  TIMER_SEC=parseInt(document.getElementById('time-select').value);
  filtered=allQ.filter(q=>subj==='all'||q.mata_pelajaran===subj);
  if(filtered.length<3){alert('Soal tidak cukup!');return;}
  filtered=shuffle(filtered).slice(0,totalQ);
  currentQ=0;scoreRed=0;scoreBlue=0;streakRed=0;streakBlue=0;
  updateScores();
  document.getElementById('start-screen').classList.add('hidden');
  showQ();
}

function showQ(){
  if(currentQ>=filtered.length){endGame();return;}
  const q=filtered[currentQ];
  answered=false;
  clearBubbles();

  document.getElementById('q-tag').textContent=q.mata_pelajaran||'Umum';
  document.getElementById('q-cnt').textContent=`Soal ${currentQ+1}`;
  document.getElementById('q-counter').textContent=`${currentQ+1}/${filtered.length}`;
  document.getElementById('q-text').textContent=q.pertanyaan;

  const opts=[
    {k:'A',t:q.pilihan_a,correct:q.jawaban_benar.trim().toUpperCase()==='A'},
    {k:'B',t:q.pilihan_b,correct:q.jawaban_benar.trim().toUpperCase()==='B'},
    {k:'C',t:q.pilihan_c,correct:q.jawaban_benar.trim().toUpperCase()==='C'},
    {k:'D',t:q.pilihan_d,correct:q.jawaban_benar.trim().toUpperCase()==='D'},
  ].filter(o=>o.t);

  // Spawn bubbles setelah sedikit delay agar soal terbaca dulu
  setTimeout(()=>spawnBubbles(opts),300);
  startTimer();
}

function spawnBubbles(opts){
  const arena=document.getElementById('arena');
  const W=arena.clientWidth, H=arena.clientHeight;
  const half=W/2;
  const minSize=Math.max(80, Math.min(120, W*0.12));
  const maxSize=Math.max(100, Math.min(150, W*0.15));

  opts.forEach((opt,i)=>{
    const size=minSize+Math.random()*(maxSize-minSize);
    const isLeft=i<2; // A,B di kiri (merah), C,D di kanan (biru)
    const palette=isLeft?COLORS_RED:COLORS_BLUE;
    const col=palette[i%palette.length];

    // Posisi acak di zona masing-masing
    const xMin=isLeft?4:half+4;
    const xMax=isLeft?half-size-4:W-size-4;
    const x=xMin+Math.random()*(xMax-xMin);
    const y=40+Math.random()*(H-size-60);
    const duration=(3+Math.random()*2).toFixed(1);
    const delay=(Math.random()*1).toFixed(1);

    const el=document.createElement('div');
    el.className='bubble';
    el.dataset.correct=opt.correct;
    el.dataset.key=opt.k;
    el.style.cssText=`
      left:${x}px;top:${y}px;width:${size}px;height:${size}px;
      font-size:${Math.max(13,size*0.13)}px;
      background:${col.bg};border-color:${col.border};color:${col.text};
      animation-duration:${duration}s;animation-delay:-${delay}s;
    `;
    el.innerHTML=`<div style="pointer-events:none"><div style="font-size:${Math.max(11,size*0.1)}px;opacity:.7;margin-bottom:2px">${opt.k}</div>${opt.t}</div>`;
    el.ontouchstart=(e)=>{e.preventDefault();tapBubble(el,opt.correct,isLeft);};
    el.onclick=()=>tapBubble(el,opt.correct,isLeft);
    arena.appendChild(el);
    bubbles.push(el);
  });
}

function tapBubble(el,isCorrect,isRedTeam){
  if(answered)return;
  answered=true;
  clearInterval(timer);

  if(isCorrect){
    el.classList.add('correct-anim');
    el.style.borderColor='#4CAF50';
    el.style.background='rgba(76,175,80,.4)';
    if(isRedTeam){
      scoreRed++;streakRed++;streakBlue=0;
      showFeedback(`🔴 Tepat! +${streakRed>1?streakRed+'x🔥':1}`,'#EF5350');
    } else {
      scoreBlue++;streakBlue++;streakRed=0;
      showFeedback(`🔵 Tepat! +${streakBlue>1?streakBlue+'x🔥':1}`,'#42A5F5');
    }
    updateScores();
  } else {
    el.classList.add('wrong-anim');
    showFeedback('❌ Salah!','#aaa');
    streakRed=0;streakBlue=0;
    // Kasih petunjuk: highlight jawaban benar
    bubbles.forEach(b=>{
      if(b.dataset.correct==='true'){
        b.style.borderColor='#4CAF50';
        b.style.background='rgba(76,175,80,.3)';
      }
    });
  }
  setTimeout(()=>{currentQ++;showQ();},1800);
}

function startTimer(){
  timerLeft=TIMER_SEC;
  const num=document.getElementById('timer-num');
  const fill=document.getElementById('timer-ring-fill');
  num.textContent=timerLeft;fill.style.width='100%';fill.style.background='#F9A825';
  clearInterval(timer);
  timer=setInterval(()=>{
    timerLeft--;
    num.textContent=timerLeft;
    const pct=(timerLeft/TIMER_SEC)*100;
    fill.style.width=pct+'%';
    if(pct<30){fill.style.background='#EF5350';num.style.color='#EF5350';}
    else num.style.color='#F9A825';
    if(timerLeft<=0){
      clearInterval(timer);
      if(!answered){
        answered=true;
        // Tunjukkan jawaban benar
        bubbles.forEach(b=>{
          if(b.dataset.correct==='true'){b.style.borderColor='#4CAF50';b.style.background='rgba(76,175,80,.3)';}
        });
        streakRed=0;streakBlue=0;
        showFeedback('⏰ Waktu habis!','#F9A825');
        setTimeout(()=>{currentQ++;showQ();},1600);
      }
    }
  },1000);
}

function updateScores(){
  document.getElementById('score-red').textContent=scoreRed;
  document.getElementById('score-blue').textContent=scoreBlue;
  document.getElementById('streak-red').textContent=streakRed>1?`🔥 ${streakRed}x beruntun!`:'';
  document.getElementById('streak-blue').textContent=streakBlue>1?`🔥 ${streakBlue}x beruntun!`:'';
}

function showFeedback(msg,color){
  const el=document.getElementById('feedback');
  el.textContent=msg;el.style.color=color;el.style.opacity='1';
  setTimeout(()=>el.style.opacity='0',900);
}

function clearBubbles(){
  bubbles.forEach(b=>b.remove());
  bubbles=[];
}

function endGame(){
  clearInterval(timer);clearBubbles();
  document.getElementById('end-screen').classList.remove('hidden');
  document.getElementById('final-red').textContent=scoreRed;
  document.getElementById('final-blue').textContent=scoreBlue;
  const em=document.getElementById('win-emoji');
  const wt=document.getElementById('win-text');
  const ws=document.getElementById('win-sub');
  if(scoreRed>scoreBlue){em.textContent='🔴🏆';wt.style.color='#EF5350';wt.textContent='Tim Merah Menang!';ws.textContent='Jari Tim Merah lebih cepat dan tepat!';}
  else if(scoreBlue>scoreRed){em.textContent='🔵🏆';wt.style.color='#42A5F5';wt.textContent='Tim Biru Menang!';ws.textContent='Jari Tim Biru lebih cepat dan tepat!';}
  else{em.textContent='🤝';wt.style.color='#F9A825';wt.textContent='Seri!';ws.textContent='Kedua tim sama-sama jago!';}
}

function restartGame(){document.getElementById('end-screen').classList.add('hidden');document.getElementById('start-screen').classList.remove('hidden');}
function shuffle(arr){return[...arr].sort(()=>Math.random()-.5);}
loadQuestions();
</script>
</body>
</html>
